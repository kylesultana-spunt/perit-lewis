<script>
(function(){
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  var slug=new URLSearchParams(location.search).get('p');
  if(!slug || !window.PROJECTS[slug]) slug=window.PROJECT_ORDER[0];
  var p=window.PROJECTS[slug];
  document.title=p.name+" — Perit Lewis";
  var narr = String(p.narrative||'').split(/\n\n+/).map(function(t){return '<p>'+esc(t.trim())+'</p>';}).join('');
  var gal = p.images.map(function(src){
    return '<div class="g"><img src="'+src+'" alt="" loading="lazy"></div>';
  }).join('');
  document.getElementById('ppRoot').innerHTML =
    '<a href="portfolio.html" class="pp-back">← Portfolio</a>'
  + '<figure class="pp-hero"><img src="'+p.cover+'" alt="'+esc(p.name)+'">'
  +   '<figcaption class="vname">'+esc(p.category)+'</figcaption>'
  +   '<span class="vurl">Perit Lewis — '+esc(p.location)+'</span></figure>'
  + '<section class="pp-head"><h1 class="pp-title">'+esc(p.name)+'</h1><div>'
  +   '<div class="pp-specs">'
  +     '<div class="pp-spec"><div class="k">Client</div><div class="v">'+esc(p.client)+'</div></div>'
  +     '<div class="pp-spec"><div class="k">Year</div><div class="v">'+esc(p.year)+'</div></div>'
  +     '<div class="pp-spec"><div class="k">Scope</div><div class="v">'+esc(p.scope)+'</div></div>'
  +     '<div class="pp-spec"><div class="k">Location</div><div class="v">'+esc(p.location)+'</div></div>'
  +   '</div>'
  +   '<a href="#gallery" class="pp-explore">View gallery <span class="arr">+</span></a></div></section>'
  + '<section class="pp-narrative">'+narr+'</section>'
  + '<section class="pp-gallery" id="gallery">'+gal+'</section>'
  + '<nav class="pp-next"><a href="portfolio.html">← All Projects</a></nav>';
})();
</script>
